<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0e1018;--bg2:#13161f;--bg3:#191c28;--bg4:#1e2230;
  --border:#232738;--border2:#2e334a;--text:#e8eaf2;
  --muted:#565c7a;--muted2:#8890b0;--accent:#5865f2;
  --gold:#f0a500;--gold-bg:#221b06;--gold-av:#2e2208;
  --silver:#9aa0b8;--silver-bg:#191c2c;--silver-av:#1f2236;
  --bronze:#c07840;--bronze-bg:#1e1608;--bronze-av:#261a0a;
}
html,body{height:100%;background:var(--bg);}
body{font-family:'Barlow',sans-serif;color:var(--text);font-size:14px;}
.layout{display:flex;flex-direction:column;height:100vh;}

.top-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:14px;height:50px;flex-shrink:0;}
.logo-mark{display:flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;letter-spacing:3px;font-weight:900;font-size:18px;text-transform:uppercase;}
.logo-mark .alpha{color:var(--text);}
.logo-mark .max{color:#fff;background:var(--accent);padding:1px 8px;border-radius:3px;font-size:16px;letter-spacing:4px;}
.logo-divider{width:1px;height:20px;background:var(--border2);}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:600;}
.header-spacer{flex:1;}
.request-btn{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,#ff4757,#c0392b);color:#fff;border:none;padding:7px 16px;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:opacity .15s;white-space:nowrap;}
.request-btn:hover{opacity:.85;}
.sync-pill{display:flex;align-items:center;gap:6px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;color:var(--muted);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#2ed573;box-shadow:0 0 6px rgba(46,213,115,.6);}
.sync-dot.offline{background:#ff4757;box-shadow:0 0 6px rgba(255,71,87,.5);}
.sync-dot.syncing{background:var(--gold);box-shadow:0 0 6px rgba(240,165,0,.6);animation:sdPulse .7s ease-in-out infinite;}
@keyframes sdPulse{0%,100%{opacity:1;}50%{opacity:.25;}}

.tabs-bar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 18px 8px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;min-width:76px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;transition:color .15s,border-color .15s;user-select:none;}
.tab:hover{color:var(--muted2);}
.tab.active{color:var(--text);border-bottom-color:var(--accent);}
.tab-icon{font-size:15px;line-height:1;}

.main-area{display:flex;flex:1;overflow:hidden;}
.sidebar{width:56px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:18px 0;gap:8px;flex-shrink:0;}
.sb-logo{font-size:9px;font-weight:900;letter-spacing:3px;color:var(--accent);writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);margin-bottom:12px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;}
.sb-logo em{color:var(--muted2);font-style:normal;}
.sb-btn{width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;font-size:16px;transition:background .15s,color .15s;}
.sb-btn:hover{background:var(--bg4);color:var(--text);}
.sb-btn.active{background:var(--accent);color:#fff;}
.content{flex:1;overflow-y:auto;background:var(--bg);}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* NEWS */
.news-page{max-width:740px;margin:0 auto;padding:24px 20px;}
.news-page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.news-page-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;letter-spacing:1px;text-transform:uppercase;}
.news-page-title span{color:var(--accent);}
.news-page-count{font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;}
.news-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;transition:border-color .15s;}
.news-card:hover{border-color:var(--border2);}
.news-card.alert-card{border-left:3px solid #ff4757;}
.news-card.manual-card{border-left:3px solid var(--accent);}
.news-card-inner{display:flex;align-items:center;gap:14px;padding:16px 18px;}
.news-card-icon{font-size:22px;flex-shrink:0;line-height:1;}
.news-card-body{flex:1;min-width:0;}
.news-card-headline{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;letter-spacing:.3px;line-height:1.3;margin-bottom:4px;}
.news-card-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.news-card-type{padding:1px 6px;border-radius:3px;font-weight:700;text-transform:uppercase;font-size:9px;letter-spacing:1px;}
.type-alert{background:rgba(255,71,87,.15);color:#ff4757;}
.type-manual{background:rgba(88,101,242,.15);color:#818cf8;}
.news-card-players{display:flex;gap:6px;padding:0 18px 14px;flex-wrap:wrap;}
.nc-player-chip{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 5px;cursor:pointer;transition:border-color .15s;text-decoration:none;}
.nc-player-chip:hover{border-color:var(--border2);}
.nc-chip-av{width:22px;height:22px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;}
.nc-chip-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.nc-chip-name{font-size:11px;font-weight:700;color:var(--text);font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px;}
.news-empty-state{text-align:center;padding:80px 24px;color:var(--muted);}
.news-empty-state .big{font-size:48px;margin-bottom:12px;}
.news-empty-state p{font-size:14px;line-height:1.8;}

/* RANKINGS */
.list-header{display:grid;grid-template-columns:116px 1fr 160px;padding:9px 20px;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10;font-family:'Barlow Condensed',sans-serif;}
.rrow{display:grid;grid-template-columns:116px 1fr 160px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;min-height:76px;align-items:stretch;position:relative;}
.rrow:hover{background:rgba(255,255,255,.015);}
.rrow:last-child{border-bottom:none;}
.rcard{display:flex;align-items:stretch;height:100%;position:relative;}
.rcard-medal{position:relative;}
.rcard-medal::before{content:'';position:absolute;inset:4px;border-radius:5px;pointer-events:none;z-index:3;}
.medal-gold .rcard-medal::before{box-shadow:0 0 0 2px var(--gold),0 0 12px rgba(240,165,0,.35);}
.medal-silver .rcard-medal::before{box-shadow:0 0 0 2px var(--silver),0 0 10px rgba(154,160,184,.25);}
.medal-bronze .rcard-medal::before{box-shadow:0 0 0 2px var(--bronze),0 0 10px rgba(192,120,64,.25);}
.rnum{width:52px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;font-family:'Barlow Condensed',sans-serif;}
.rav{flex:1;overflow:hidden;display:flex;}
.av-fill{width:100%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;overflow:hidden;font-family:'Barlow Condensed',sans-serif;}
.av-fill img{width:100%;height:100%;object-fit:cover;display:block;}
.rrow-1 .rnum{background:var(--gold-bg);color:var(--gold);}
.rrow-1 .rav{background:linear-gradient(135deg,var(--gold-av),#1a1200);}
.rrow-2 .rnum{background:var(--silver-bg);color:var(--silver);}
.rrow-2 .rav{background:linear-gradient(135deg,var(--silver-av),#131623);}
.rrow-3 .rnum{background:var(--bronze-bg);color:var(--bronze);}
.rrow-3 .rav{background:linear-gradient(135deg,var(--bronze-av),#161008);}
.rrow-n .rnum{background:var(--bg3);color:var(--muted2);}
.rrow-n .rav{background:var(--bg3);}
.pcell{padding:0 14px;display:flex;flex-direction:column;justify-content:center;gap:5px;}
.pname{font-size:16px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.psub{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted2);flex-wrap:wrap;}
.scell{padding:0 20px 0 0;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:4px;}
.sval{font-size:22px;font-weight:900;font-family:'Barlow Condensed',sans-serif;}
.sbar-wrap{width:86px;height:4px;background:var(--border2);border-radius:2px;overflow:hidden;}
.sbar{height:100%;border-radius:2px;}
.tbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;}
.tpip{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.override-badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--muted2);}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
.mov.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:580px;position:relative;margin:auto;}
.modal-hero{position:relative;height:160px;overflow:hidden;border-radius:12px 12px 0 0;}
.modal-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(8px) brightness(.4);transform:scale(1.1);}
.modal-hero-av{position:absolute;left:22px;bottom:-30px;width:80px;height:80px;border-radius:10px;overflow:hidden;border:3px solid var(--bg2);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;font-family:'Barlow Condensed',sans-serif;box-shadow:0 4px 20px rgba(0,0,0,.6);}
.modal-hero-av img{width:100%;height:100%;object-fit:cover;}
.modal-hero-rank{position:absolute;right:18px;bottom:14px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:1px;text-transform:uppercase;}
.mclose{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:2;}
.mclose:hover{background:rgba(255,71,87,.7);}
.modal-nameblock{padding:40px 22px 14px;border-bottom:1px solid var(--border);}
.mn{font-size:26px;font-weight:900;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;line-height:1;}
.mn-nick{font-size:13px;color:var(--muted2);margin-top:3px;}
.mn-tier{margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.mbody{padding:16px 22px 6px;}
.mstats-big{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.ms{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:12px 8px;text-align:center;}
.msl{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;}
.msv{font-size:26px;font-weight:900;font-family:'Barlow Condensed',sans-serif;}
.mbio{font-size:13px;color:var(--muted2);line-height:1.75;border-left:2px solid var(--accent);padding-left:12px;margin-bottom:16px;font-style:italic;}
.mtraits{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;}
.mtrait{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 9px;border-radius:3px;background:rgba(88,101,242,.12);border:1px solid rgba(88,101,242,.25);color:#818cf8;font-family:'Barlow Condensed',sans-serif;}
.mbar-section{margin-bottom:16px;}
.mbar-section-title{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-family:'Barlow Condensed',sans-serif;}
.mbar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.mbar-label{font-size:11px;font-weight:700;color:var(--muted2);letter-spacing:.5px;text-transform:uppercase;width:46px;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;}
.mbar-wrap{flex:1;height:7px;background:var(--border2);border-radius:4px;overflow:hidden;}
.mbar-fill{height:100%;border-radius:4px;}
.mbar-val{font-size:13px;font-weight:700;color:var(--text);width:30px;text-align:right;font-family:'Barlow Condensed',sans-serif;}

/* VOTE */
.vote-section{padding:14px 22px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.vote-label{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;}
.vote-btns{display:flex;gap:8px;flex:1;}
.vote-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.5px;text-transform:uppercase;transition:all .18s;color:var(--muted2);user-select:none;}
.vote-btn:hover{background:var(--bg4);}
.vote-btn.voted-over{background:rgba(255,71,87,.12);border-color:#ff4757;color:#ff4757;}
.vote-btn.voted-under{background:rgba(46,213,115,.12);border-color:#2ed573;color:#2ed573;}
.vote-btn .vicon{font-size:16px;}
.vote-count{font-size:16px;font-weight:900;font-family:'Barlow Condensed',sans-serif;}
.vote-tally{font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;margin-left:auto;text-align:right;line-height:1.5;}

/* MODAL TABS */
.modal-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 22px;}
.modal-tab{padding:10px 4px;margin-right:18px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
.modal-tab.active{color:var(--text);border-bottom-color:var(--accent);}
.modal-tab-panel{display:none;padding:14px 22px 18px;}
.modal-tab-panel.active{display:block;}
.modal-news-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.modal-news-item:last-child{border-bottom:none;}
.modal-news-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.modal-news-text{flex:1;font-size:13px;font-family:'Barlow Condensed',sans-serif;font-weight:600;line-height:1.4;letter-spacing:.2px;}
.modal-news-time{font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;flex-shrink:0;white-space:nowrap;}
.modal-news-empty{font-size:12px;color:var(--muted);font-style:italic;padding:8px 0;}

/* COMMENTS */
.comments-list{margin-bottom:14px;}
.comment-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.comment-item:last-child{border-bottom:none;}
.comment-av{width:32px;height:32px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--muted2);flex-shrink:0;font-family:'Barlow Condensed',sans-serif;}
.comment-body{flex:1;min-width:0;}
.comment-name{font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif;color:var(--text);}
.comment-text{font-size:13px;color:var(--muted2);line-height:1.5;margin-top:2px;word-break:break-word;}
.comment-meta{display:flex;align-items:center;gap:8px;margin-top:4px;}
.comment-time{font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;}
.comment-del{font-size:10px;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;background:none;border:none;padding:0;display:none;}
.comment-del:hover{color:#ff4757;}
.admin-active .comment-del{display:inline;}
.comment-form{display:flex;flex-direction:column;gap:8px;}
.comment-input-row{display:flex;gap:8px;}
.comment-name-input{flex:0 0 130px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:5px;font-size:12px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s;}
.comment-name-input:focus{border-color:var(--accent);}
.comment-text-input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:5px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s;resize:none;min-height:60px;}
.comment-text-input:focus{border-color:var(--accent);}
.comment-submit{align-self:flex-end;background:var(--accent);color:#fff;border:none;padding:7px 18px;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity .15s;}
.comment-submit:hover{opacity:.85;}
.comments-empty{font-size:12px;color:var(--muted);font-style:italic;padding:8px 0;}

/* EMPTY / LOADING */
.empty{text-align:center;padding:70px 24px;color:var(--muted);font-size:14px;line-height:2.2;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--muted);}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:lspin .7s linear infinite;}
@keyframes lspin{to{transform:rotate(360deg);}}

/* ADMIN */
.dev-wrap{padding:22px;max-width:960px;margin:0 auto;}
.dev-top{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.dev-badge{background:#ff4757;color:#fff;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;}
.dev-title{font-size:20px;font-weight:900;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:680px){.dgrid{grid-template-columns:1fr;}}
.dcard{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;}
.dcard-t{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;}
.fg{margin-bottom:9px;}
.fg label{display:block;font-size:9px;color:var(--muted);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;font-family:'Barlow Condensed',sans-serif;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:5px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);}
.fg select option{background:var(--bg3);}
.fg textarea{resize:vertical;min-height:60px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.auto-score-note{font-size:10px;color:var(--muted);margin-top:4px;font-style:italic;}
.btn{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:5px;font-weight:700;font-size:12px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-sm{padding:5px 11px;font-size:11px;}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--muted2);}
.btn-g:hover{color:var(--text);}
.btn-r{background:#ff4757;}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.swatches{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
.sw:hover{transform:scale(1.2);}
.sw.sel{border-color:#fff;transform:scale(1.2);}
.tbox{display:flex;flex-wrap:wrap;gap:4px;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:6px;min-height:36px;cursor:text;}
.tpill{display:flex;align-items:center;gap:4px;background:rgba(88,101,242,.15);border:1px solid rgba(88,101,242,.3);color:#818cf8;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;}
.tx{cursor:pointer;color:var(--muted);font-size:12px;}
.tx:hover{color:#ff4757;}
.dli{display:flex;align-items:center;gap:10px;padding:9px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;margin-bottom:6px;}
.dli-av{width:34px;height:34px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;font-family:'Barlow Condensed',sans-serif;}
.dli-av img{width:100%;height:100%;object-fit:cover;border-radius:5px;}
.dli-info{flex:1;min-width:0;}
.dli-name{font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dli-meta{font-size:10px;color:var(--muted);margin-top:1px;font-family:'Barlow Condensed',sans-serif;}
.dli-btns{display:flex;gap:5px;flex-shrink:0;}
.alert-msg{padding:8px 12px;border-radius:5px;font-size:12px;margin-bottom:10px;display:none;}
.alert-msg.show{display:block;}
.al-ok{background:rgba(46,213,115,.1);border:1px solid rgba(46,213,115,.25);color:#2ed573;}
.al-err{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.25);color:#ff4757;}
.photo-area{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.photo-prev{width:46px;height:46px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;}
.photo-prev img{width:100%;height:100%;object-fit:cover;}
.photo-opts{flex:1;display:flex;flex-direction:column;gap:5px;}
.photo-or{font-size:9px;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;}
.nli{display:flex;align-items:flex-start;gap:10px;padding:9px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;margin-bottom:6px;}
.nli-info{flex:1;min-width:0;}
.nli-headline{font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif;line-height:1.3;}
.nli-meta{font-size:10px;color:var(--muted);margin-top:2px;font-family:'Barlow Condensed',sans-serif;}
.nli-btns{display:flex;gap:5px;flex-shrink:0;}

/* TIER OVERRIDE BUTTONS in admin */
.tier-btn-group{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
.tier-btn{padding:6px 11px;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;cursor:pointer;border:1px solid transparent;opacity:.4;transition:opacity .15s,transform .12s,border-color .15s,background .15s;background:var(--bg3);}
.tier-btn:hover{opacity:.7;}
.tier-btn.sel{opacity:1;border-color:currentColor;transform:scale(1.06);background:var(--bg4);}
.tier-btn[data-tier="auto"]   {color:var(--muted2);}
.tier-btn[data-tier="Alpha+"] {color:#ff4757;}
.tier-btn[data-tier="Alpha"]  {color:#ff8c00;}
.tier-btn[data-tier="Solid"]  {color:#ffd32a;}
.tier-btn[data-tier="Mid"]    {color:#2ed573;}
.tier-btn[data-tier="Low"]    {color:#1e90ff;}
.tier-btn[data-tier="NPC"]    {color:#a29bfe;}

/* TOP 3 PODIUM */
@keyframes goldPulse  {0%,100%{box-shadow:inset 0 0 0 0 rgba(240,165,0,0);}   50%{box-shadow:inset 0 0 50px 0 rgba(240,165,0,.07);}}
@keyframes silverPulse{0%,100%{box-shadow:inset 0 0 0 0 rgba(154,160,184,0);} 50%{box-shadow:inset 0 0 40px 0 rgba(154,160,184,.05);}}
@keyframes bronzePulse{0%,100%{box-shadow:inset 0 0 0 0 rgba(192,120,64,0);}  50%{box-shadow:inset 0 0 36px 0 rgba(192,120,64,.05);}}
@keyframes rowIn      {from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
@keyframes crownBob   {0%,100%{transform:translateX(-50%) translateY(0) rotate(-6deg);}50%{transform:translateX(-50%) translateY(-3px) rotate(6deg);}}
@keyframes conicSpin  {to{transform:rotate(360deg);}}

.rrow              {animation:rowIn .38s ease both;}
.rrow:nth-child(2) {animation-delay:.04s;}
.rrow:nth-child(3) {animation-delay:.08s;}
.rrow:nth-child(4) {animation-delay:.12s;}
.rrow:nth-child(n+5){animation-delay:.15s;}

.rrow-1{background:linear-gradient(90deg,rgba(240,165,0,.13) 0%,rgba(240,165,0,.05) 45%,transparent 100%)!important;border-bottom:1px solid rgba(240,165,0,.30)!important;animation:rowIn .38s ease both,goldPulse 3s .4s ease-in-out infinite;}
.rrow-1 .rnum{background:linear-gradient(155deg,#30230a,#1c1400)!important;color:var(--gold)!important;font-size:22px!important;text-shadow:0 0 18px rgba(240,165,0,.9),0 0 36px rgba(240,165,0,.3);position:relative;flex-direction:column;padding-top:20px;align-items:flex-end;padding-bottom:6px;}
.rrow-1 .rnum::before{content:'👑';font-size:14px;text-shadow:none;position:absolute;top:6px;left:50%;transform:translateX(-50%);animation:crownBob 2.6s ease-in-out infinite;}
.rrow-1 .rav{background:linear-gradient(140deg,#3e2c00,#201800)!important;border-right:2px solid rgba(240,165,0,.40);position:relative;overflow:hidden;}
.rrow-1 .rav::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(transparent 20%,rgba(240,165,0,.06) 50%,transparent 80%);animation:conicSpin 11s linear infinite;pointer-events:none;}
.rrow-1 .pname{font-size:18px!important;color:#ffe082!important;letter-spacing:.7px!important;}
.rrow-1 .sval{text-shadow:0 0 14px rgba(240,165,0,.65);}
.rrow-1:hover{background:linear-gradient(90deg,rgba(240,165,0,.19) 0%,rgba(240,165,0,.08) 45%,transparent 100%)!important;}

.rrow-2{background:linear-gradient(90deg,rgba(180,186,215,.10) 0%,rgba(180,186,215,.04) 45%,transparent 100%)!important;border-bottom:1px solid rgba(154,160,184,.24)!important;animation:rowIn .38s .04s ease both,silverPulse 3.8s .44s ease-in-out infinite;}
.rrow-2 .rnum{background:linear-gradient(155deg,#1e2232,#111420)!important;color:#cdd1e8!important;font-size:22px!important;text-shadow:0 0 14px rgba(195,200,230,.65);}
.rrow-2 .rav{background:linear-gradient(140deg,#242848,#131624)!important;border-right:2px solid rgba(154,160,184,.26);}
.rrow-2 .pname{font-size:17px!important;color:#dde0f8!important;}
.rrow-2 .sval{text-shadow:0 0 10px rgba(180,186,215,.45);}

.rrow-3{background:linear-gradient(90deg,rgba(192,120,64,.09) 0%,rgba(192,120,64,.03) 45%,transparent 100%)!important;border-bottom:1px solid rgba(192,120,64,.22)!important;animation:rowIn .38s .08s ease both,bronzePulse 4.2s .48s ease-in-out infinite;}
.rrow-3 .rnum{background:linear-gradient(155deg,#241b0a,#141008)!important;color:#d4945a!important;font-size:22px!important;text-shadow:0 0 12px rgba(192,120,64,.58);}
.rrow-3 .rav{background:linear-gradient(140deg,#2c1e0e,#181008)!important;border-right:2px solid rgba(192,120,64,.26);}
.rrow-3 .pname{color:#e0aa80!important;}
.rrow-3 .sval{text-shadow:0 0 8px rgba(192,120,64,.42);}
</style>

<body>
<div class="layout">
  <div class="top-header">
    <div class="logo-mark"><span class="alpha">ALPHA</span><span class="max">MAX</span></div>
    <div class="logo-divider"></div>
    <div class="logo-sub">Rankings</div>
    <div class="header-spacer"></div>
    <div class="sync-pill"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Connecting…</span></div>
    <a class="request-btn" href="https://forms.gle/8oBw98GLsyRR4AWK9" target="_blank" rel="noopener">⚡ Request An Alpha</a>
  </div>
  <div class="tabs-bar" id="tabs-bar">
    <div class="tab active" data-tab="news"    onclick="setTab(this)"><span class="tab-icon">📰</span>News</div>
    <div class="tab"        data-tab="overall" onclick="setTab(this)"><span class="tab-icon">🏆</span>Overall</div>
    <div class="tab"        data-tab="alpha"   onclick="setTab(this)"><span class="tab-icon">⚡</span>Alpha</div>
    <div class="tab"        data-tab="clout"   onclick="setTab(this)"><span class="tab-icon">👑</span>Clout</div>
    <div class="tab"        data-tab="rizz"    onclick="setTab(this)"><span class="tab-icon">🔥</span>Rizz</div>
    <div class="tab"        data-tab="tier"    onclick="setTab(this)"><span class="tab-icon">📊</span>Tier List</div>
  </div>
  <div class="main-area">
    <div class="sidebar">
      <div class="sb-logo">ALPHA<em>MAX</em></div>
      <div class="sb-btn active">≡</div>
    </div>
    <div class="content" id="content">
      <div class="loading-screen"><div class="loading-spinner"></div><span>Connecting to Firebase…</span></div>
    </div>
  </div>
</div>

<div class="mov" id="modal" onclick="closeMovOv(event)">
  <div class="modal" id="modal-box">
    <button class="mclose" onclick="closeModal()">✕</button>
    <div id="modal-inner"></div>
  </div>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot,
         setDoc, deleteDoc, addDoc, query,
         orderBy, writeBatch }
  from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

// ── CONFIG CHECK ────────────────────────────────────────────────
const cfg = window.FIREBASE_CONFIG;
if (!cfg || cfg.apiKey === "PASTE_YOUR_apiKey_HERE") {
  document.getElementById('content').innerHTML = `
    <div class="empty" style="max-width:480px;margin:60px auto;text-align:left;padding:0 24px;">
      <div style="font-size:36px;margin-bottom:14px;">🔥</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;color:var(--text);margin-bottom:10px;">Firebase Not Configured</div>
      <p style="color:var(--muted2);line-height:1.8;margin-bottom:14px;">Open this HTML file and paste your Firebase project credentials into <code style="background:var(--bg3);padding:2px 6px;border-radius:3px;font-size:12px;">window.FIREBASE_CONFIG</code> near the top.</p>
      <ol style="color:var(--muted2);line-height:2.4;padding-left:18px;font-size:13px;">
        <li>Go to <strong style="color:var(--text)">console.firebase.google.com</strong></li>
        <li>Add project → name it → Continue (disable Analytics is fine)</li>
        <li>Click the <strong style="color:var(--text)">&lt;/&gt; Web</strong> icon → register app → copy config</li>
        <li>Firestore Database → Create database → <strong style="color:var(--text)">Test mode</strong></li>
        <li>Paste values into this file, save, deploy — done!</li>
      </ol>
    </div>`;
  document.getElementById('sync-dot').className = 'sync-dot offline';
  document.getElementById('sync-label').textContent = 'Not Connected';
  throw new Error("Firebase not configured — fill in FIREBASE_CONFIG");
}

// ── INIT ────────────────────────────────────────────────────────
const app = initializeApp(cfg);
const db  = getFirestore(app);

// ── CONSTANTS ───────────────────────────────────────────────────
const COLORS = ['#e74c3c','#e67e22','#f39c12','#27ae60','#16a085','#2980b9','#8e44ad','#e91e63','#00bcd4','#607d8b'];
const TIERS  = ['auto','Alpha+','Alpha','Solid','Mid','Low','NPC'];
const TIER_COLORS = {'Alpha+':'#ff4757','Alpha':'#ff8c00','Solid':'#ffd32a','Mid':'#2ed573','Low':'#1e90ff','NPC':'#a29bfe'};
const TIER_RANGES = [{label:'Alpha+',min:90},{label:'Alpha',min:75},{label:'Solid',min:60},{label:'Mid',min:45},{label:'Low',min:30},{label:'NPC',min:0}];
const CK = 'alphamax_code4';

// ── STATE ───────────────────────────────────────────────────────
let people   = [], newsItems = [], comments = {};
let tab = 'news', traits = [], selColor = COLORS[0], selTierOverride = 'auto';
let buf = '', btimer = null, isAdmin = false;
let currentModalId = null, currentModalTab = 'news';
let prevRanks = {};

// ── UTILS ───────────────────────────────────────────────────────
const getCode  = () => localStorage.getItem(CK) || 'me123';
const setCode  = c  => localStorage.setItem(CK, c);
const getVotes = () => { try{return JSON.parse(localStorage.getItem('am_votes'))||{};}catch{return{};} };
const setVotes = v  => localStorage.setItem('am_votes', JSON.stringify(v));
const clamp    = v  => Math.min(100,Math.max(0,isNaN(Number(v))?50:Number(v)));
const cs       = (a,c,r) => Math.round((clamp(a)+clamp(c)+clamp(r))/3);
const esc      = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const g        = id => document.getElementById(id);
const sorted   = () => [...people].sort((a,b)=>(b.score||0)-(a.score||0));
const sortedBy = k  => [...people].sort((a,b)=>(b[k]||0)-(a[k]||0));

function setSyncStatus(s){
  const dot=g('sync-dot'),lbl=g('sync-label'); if(!dot)return;
  dot.className='sync-dot'+(s==='live'?'':s==='syncing'?' syncing':' offline');
  lbl.textContent=s==='live'?'Live':s==='syncing'?'Syncing…':'Offline';
}

function tierInfo(score, override){
  if(override && override!=='auto') return {label:override,color:TIER_COLORS[override]};
  for(const t of TIER_RANGES) if(score>=t.min) return {label:t.label,color:TIER_COLORS[t.label]};
  return {label:'NPC',color:TIER_COLORS['NPC']};
}

function timeAgo(ts){
  const m=Math.floor((Date.now()-ts)/60000);
  if(m<1)return'just now'; if(m<60)return m+'m ago';
  const h=Math.floor(m/60); if(h<24)return h+'h ago';
  return Math.floor(h/24)+'d ago';
}

// ── AVATARS ─────────────────────────────────────────────────────
function avSmall(p,sz,r){
  const init=p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const bg=p.color||COLORS[0];
  const st=`background:${bg};width:${sz}px;height:${sz}px;border-radius:${r}px;font-size:${Math.round(sz*.3)}px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;`;
  if(p.photo)return`<div style="${st}"><img src="${p.photo}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover;border-radius:${r}px;"></div>`;
  return`<div style="${st}">${init}</div>`;
}
function avFill(p){
  const init=p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const bg=p.color||COLORS[0];
  const st=`background:${bg};width:100%;height:100%;font-size:18px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Barlow Condensed',sans-serif;`;
  if(p.photo)return`<div class="av-fill" style="${st}"><img src="${p.photo}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover;display:block;"></div>`;
  return`<div class="av-fill" style="${st}">${init}</div>`;
}

// ── AUTO-ALERTS ──────────────────────────────────────────────────
const TAKEOVER=[
  '{w} just ate {l}\'s lunch. And his dinner. And his entire fridge.',
  '{w} said "hold my protein shake" and vaulted clean over {l}.',
  '{l} got absolutely cooked. Chef {w} is in the building.',
  'BREAKING: {l} spotted looking for excuses. {w} spotted looking for more victims.',
  '{w} climbed over {l} like he wasn\'t even there. Embarrassing scenes.',
  'Prayers up for {l}. {w} just rearranged the whole leaderboard.',
  '{l} fell off harder than his hairline. {w} takes the spot.',
  '{w} woke up and chose violence. {l} is the casualty.',
  '{l} has been dethroned. Long live {w}.',
  'The gap between {w} and {l} is now larger than {l}\'s ego.',
  '{w} just speed-ran the leaderboard. {l} is the final boss they already beat.',
];
const makeAlert=(w,l)=>TAKEOVER[Math.floor(Math.random()*TAKEOVER.length)].replace(/\{w\}/g,w).replace(/\{l\}/g,l);
async function checkRankChanges(before){
  const after={}; sorted().forEach((p,i)=>after[p.id]=i+1);
  if(Object.keys(before).length>0){
    sorted().forEach((p,i)=>{
      const newR=i+1,oldR=before[p.id];
      if(oldR&&oldR>newR){
        sorted().forEach((other,j)=>{
          if(other.id===p.id)return;
          const oOld=before[other.id],oNew=j+1;
          if(oOld&&oOld<oldR&&oNew>newR){
            addDoc(collection(db,'news'),{headline:makeAlert(p.name,other.name),type:'alert',ts:Date.now(),mentionedIds:[p.id,other.id]});
          }
        });
      }
    });
  }
  prevRanks=after;
}

// ── RENDER ───────────────────────────────────────────────────────
function render(){
  if(tab==='dev'){renderDev();return;}
  if(tab==='tier'){renderTierList();return;}
  if(tab==='news'){renderNewsPage();return;}
  renderRankings();
}

function renderNewsPage(){
  if(!newsItems.length){
    g('content').innerHTML=`<div class="news-page"><div class="news-page-header"><div class="news-page-title">Latest <span>News</span></div></div><div class="news-empty-state"><div class="big">📭</div><p>Nothing happening yet.<br>Rank changes and admin posts will appear here.</p></div></div>`;
    return;
  }
  const cards=newsItems.map(n=>{
    const icon=n.type==='alert'?'🚨':'📌';
    const cls=n.type==='alert'?'alert-card':'manual-card';
    const tCls=n.type==='alert'?'type-alert':'type-manual';
    const chips=(n.mentionedIds||[]).map(id=>{
      const p=people.find(x=>x.id===id);if(!p)return'';
      const init=p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      const bg=p.color||COLORS[0];
      const img=p.photo?`<img src="${p.photo}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`:`<span style="font-size:8px;font-weight:800;">${init}</span>`;
      return`<span class="nc-player-chip" onclick="openModal('${p.id}')"><span class="nc-chip-av" style="background:${bg};">${img}</span><span class="nc-chip-name">${esc(p.name)}</span></span>`;
    }).join('');
    return`<div class="news-card ${cls}"><div class="news-card-inner"><div class="news-card-icon">${icon}</div><div class="news-card-body"><div class="news-card-headline">${esc(n.headline)}</div><div class="news-card-meta"><span class="news-card-type ${tCls}">${n.type==='alert'?'Alert':'Update'}</span><span>${n.ts?timeAgo(n.ts):''}</span></div></div></div>${chips?`<div class="news-card-players">${chips}</div>`:''}</div>`;
  }).join('');
  g('content').innerHTML=`<div class="news-page"><div class="news-page-header"><div class="news-page-title">Latest <span>News</span></div><div class="news-page-count">${newsItems.length} item${newsItems.length!==1?'s':''}</div></div>${cards}</div>`;
}

function renderRankings(){
  const key=tab==='overall'?'score':tab;
  const ppl=sortedBy(key);
  if(!ppl.length){g('content').innerHTML=`<div class="empty">No one ranked yet.<br><small style="color:var(--muted)">Type the admin code anywhere to add profiles.</small></div>`;return;}
  const label={overall:'Overall Score',alpha:'Alpha Score',clout:'Clout',rizz:'Rizz Factor'}[tab]||'Score';
  const overallOrder=sorted().map(p=>p.id);
  let h=`<div class="list-header"><div>#&nbsp;&nbsp;Player</div><div></div><div style="text-align:right">${label}</div></div>`;
  ppl.forEach((p,i)=>{
    const n=i+1;
    const rc=n===1?'rrow-1':n===2?'rrow-2':n===3?'rrow-3':'rrow-n';
    const oRank=overallOrder.indexOf(p.id)+1;
    const mCls=oRank===1?'medal-gold':oRank===2?'medal-silver':oRank===3?'medal-bronze':'';
    const pts=p[key]||0;
    const ti=tierInfo(pts,p.tierOverride);
    const ovBadge=p.tierOverride&&p.tierOverride!=='auto'?`<span class="override-badge">★ ${esc(p.tierOverride)}</span>`:'';
    h+=`<div class="rrow ${rc}" onclick="openModal('${p.id}')">

window.openModal=function(id){currentModalId=id;const p=people.find(x=>x.id===id);if(!p)return;buildModal(p);g('modal').classList.add('open');};
function buildModal(p){
  const ti=tierInfo(p.score||0,p.tierOverride);
  const rank=sorted().findIndex(x=>x.id===p.id)+1;
  const pNews=newsItems.filter(n=>(n.mentionedIds||[]).includes(p.id));
  const pv=getVotes()[p.id]||{over:0,under:0,myVote:null};
  const total=(pv.over||0)+(pv.under||0);
  const overPct=total?Math.round((pv.over||0)/total*100):0;
  const heroStyle=p.photo?`background-image:url('${p.photo}');`:`background:${p.color||COLORS[0]};`;
  const avInner=p.photo?`<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;">`:`<span>${p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</span>`;
  const trl=(p.traits||[]).map(t=>`<span class="mtrait">${esc(t)}</span>`).join('');
  const bars=[{label:'Alpha',val:p.alpha||0,color:'#ff8c00'},{label:'Clout',val:p.clout||0,color:'#5865f2'},{label:'Rizz',val:p.rizz||0,color:'#e91e63'}]
    .map(s=>`<div class="mbar-row"><div class="mbar-label">${s.label}</div><div class="mbar-wrap"><div class="mbar-fill" style="width:${s.val}%;background:${s.color}"></div></div><div class="mbar-val">${s.val}</div></div>`).join('');
  const newsHTML=pNews.length?pNews.slice(0,8).map(n=>`<div class="modal-news-item"><span class="modal-news-icon">${n.type==='alert'?'🚨':'📌'}</span><span class="modal-news-text">${esc(n.headline)}</span><span class="modal-news-time">${n.ts?timeAgo(n.ts):''}</span></div>`).join(''):`<div class="modal-news-empty">No news featuring this player yet.</div>`;
  const pComments=(comments[p.id]||[]);
  const adminCls=isAdmin?'admin-active':'';
  const commHTML=pComments.length?pComments.map(c=>`<div class="comment-item"><div class="comment-av" style="background:${c.avatar||'#607d8b'};">${esc(c.name).split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div><div class="comment-body"><div class="comment-name">${esc(c.name)}</div><div class="comment-text">${esc(c.text)}</div><div class="comment-meta"><span class="comment-time">${timeAgo(c.ts)}</span><button class="comment-del" onclick="deleteComment('${p.id}','${c.id}')">Delete</button></div></div></div>`).join(''):`<div class="comments-empty">No comments yet. Be the first to say something.</div>`;
  const ovNote=p.tierOverride&&p.tierOverride!=='auto'?`<span style="font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;">★ tier manually set</span>`:'';
  g('modal-inner').innerHTML=`
    <div class="modal-hero"><div class="modal-hero-bg" style="${heroStyle}"></div><div class="modal-hero-av" style="background:${p.color||COLORS[0]}">${avInner}</div><div class="modal-hero-rank">Rank #${rank}</div></div>
    <div class="modal-nameblock"><div class="mn">${esc(p.name)}</div>${p.nickname?`<div class="mn-nick">${esc(p.nickname)}</div>`:''}<div class="mn-tier"><span class="tbadge"><span class="tpip" style="background:${ti.color}"></span><span style="color:${ti.color};font-size:13px;">${ti.label}</span></span>${ovNote}</div></div>
    <div class="mbody">${p.bio?`<div class="mbio">"${esc(p.bio)}"</div>`:''}<div class="mstats-big"><div class="ms"><div class="msl">Score</div><div class="msv" style="color:${ti.color}">${p.score||0}</div></div><div class="ms"><div class="msl">Alpha</div><div class="msv" style="color:#ff8c00">${p.alpha||0}</div></div><div class="ms"><div class="msl">Clout</div><div class="msv" style="color:#5865f2">${p.clout||0}</div></div><div class="ms"><div class="msl">Rizz</div><div class="msv" style="color:#e91e63">${p.rizz||0}</div></div></div><div class="mbar-section"><div class="mbar-section-title">Breakdown</div>${bars}</div>${trl?`<div class="mtraits">${trl}</div>`:''}</div>
    <div class="vote-section"><div class="vote-label">Verdict</div><div class="vote-btns"><button class="vote-btn ${pv.myVote==='over'?'voted-over':''}" id="vbtn-over" onclick="castVote('${p.id}','over')"><span class="vicon">🔥</span><span>Overrated</span><span class="vote-count" id="vc-over">${pv.over||0}</span></button><button class="vote-btn ${pv.myVote==='under'?'voted-under':''}" id="vbtn-under" onclick="castVote('${p.id}','under')"><span class="vicon">💎</span><span>Underdog</span><span class="vote-count" id="vc-under">${pv.under||0}</span></button></div><div class="vote-tally" id="vtally">${total>0?`🔥 ${overPct}% · 💎 ${100-overPct}%<br><span style="font-size:9px;">${total} vote${total!==1?'s':''}</span>`:'<span style="font-size:10px;">No votes yet</span>'}</div></div>
    <div class="modal-tabs"><div class="modal-tab ${currentModalTab==='news'?'active':''}" onclick="switchModalTab('news',this)">🗞 News</div><div class="modal-tab ${currentModalTab==='comments'?'active':''}" onclick="switchModalTab('comments',this)">💬 Comments (${pComments.length})</div></div>
    <div class="modal-tab-panel ${currentModalTab==='news'?'active':''}" id="mtp-news">${newsHTML}</div>
    <div class="modal-tab-panel ${currentModalTab==='comments'?'active':''} ${adminCls}" id="mtp-comments"><div class="comments-list">${commHTML}</div><div class="comment-form"><div class="comment-input-row"><input class="comment-name-input" id="cin-name" placeholder="Your name" maxlength="30"></div><textarea class="comment-text-input" id="cin-text" placeholder="Say something…" maxlength="280" rows="2"></textarea><button class="comment-submit" onclick="submitComment('${p.id}')">Post Comment</button></div></div>`;
}
window.switchModalTab=function(t,el){currentModalTab=t;document.querySelectorAll('.modal-tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');document.querySelectorAll('.modal-tab-panel').forEach(x=>x.classList.remove('active'));g('mtp-'+t).classList.add('active');if(isAdmin)g('mtp-comments').classList.add('admin-active');};
window.castVote=function(pid,type){const votes=getVotes();const pv=votes[pid]||{over:0,under:0,myVote:null};if(pv.myVote===type){pv[type]=Math.max(0,(pv[type]||0)-1);pv.myVote=null;}else{if(pv.myVote){pv[pv.myVote]=Math.max(0,(pv[pv.myVote]||0)-1);}pv[type]=(pv[type]||0)+1;pv.myVote=type;}votes[pid]=pv;setVotes(votes);const total=(pv.over||0)+(pv.under||0);const op=total?Math.round((pv.over||0)/total*100):0;const oc=g('vc-over'),uc=g('vc-under'),tl=g('vtally'),bo=g('vbtn-over'),bu=g('vbtn-under');if(oc)oc.textContent=pv.over||0;if(uc)uc.textContent=pv.under||0;if(bo)bo.className='vote-btn'+(pv.myVote==='over'?' voted-over':'');if(bu)bu.className='vote-btn'+(pv.myVote==='under'?' voted-under':'');if(tl)tl.innerHTML=total>0?`🔥 ${op}% · 💎 ${100-op}%<br><span style="font-size:9px;">${total} vote${total!==1?'s':''}</span>`:'<span style="font-size:10px;">No votes yet</span>';};
window.submitComment=async function(pid){const nameEl=g('cin-name'),textEl=g('cin-text');const name=(nameEl&&nameEl.value.trim())||'Anonymous';const text=textEl&&textEl.value.trim();if(!text)return;const rndColor=COLORS[Math.floor(Math.random()*COLORS.length)];await addDoc(collection(db,'comments'),{pid,name,text,ts:Date.now(),avatar:rndColor});if(textEl)textEl.value='';};
window.deleteComment=async function(pid,cid){if(!confirm('Delete this comment?'))return;await deleteDoc(doc(db,'comments',cid));};
window.closeMovOv=e=>{if(e.target===g('modal'))closeModal();};
window.closeModal=function(){g('modal').classList.remove('open');currentModalId=null;currentModalTab='news';};

window.updateAutoScore=function(){const a=parseInt((g('falpha')||{value:50}).value)||50;const c=parseInt((g('fclout')||{value:50}).value)||50;const r=parseInt((g('frizz')||{value:50}).value)||50;const s=g('fscore');if(s)s.value=cs(a,c,r);};
window.pickTierOverride=function(t,el){selTierOverride=t;document.querySelectorAll('.tier-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');};
function populatePlayerSelect(){const sel=g('nplayer');if(!sel)return;sel.innerHTML='<option value="">— None —</option>'+sorted().map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');}
function initSwatches(){const el=g('swatches');if(!el)return;el.innerHTML=COLORS.map((c,i)=>`<div class="sw${i===0?' sel':''}" style="background:${c}" onclick="pickColor('${c}',this)"></div>`).join('');}
window.pickColor=function(c,el){selColor=c;document.querySelectorAll('.sw').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');};
window.handlePhotoUpload=function(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{g('fphoto-data').value=ev.target.result;g('fphoto-url').value='';showPhotoPrev(ev.target.result);};r.readAsDataURL(file);};
window.previewPhotoUrl=function(){const url=g('fphoto-url').value.trim();g('fphoto-data').value='';showPhotoPrev(url||null);};
function showPhotoPrev(src){const el=g('photo-prev');if(!el)return;el.innerHTML=src?`<img src="${src}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='❌'">`:'📷';}
function getPhotoVal(){const d=g('fphoto-data'),u=g('fphoto-url');if(d&&d.value)return d.value;if(u&&u.value.trim())return u.value.trim();return'';}
window.focusTInput=function(){const i=g('tinput');if(i)i.focus();};
window.addTrait=function(e){if(e.key!=='Enter')return;e.preventDefault();const v=e.target.value.trim();if(!v||traits.includes(v)){e.target.value='';return;}traits.push(v);e.target.value='';renderTbox();};
window.removeTrait=function(t){traits=traits.filter(x=>x!==t);renderTbox();};
function renderTbox(){const b=g('tbox');if(!b)return;b.innerHTML=traits.map(t=>`<span class="tpill">${esc(t)}<span class="tx" onclick="removeTrait('${t}')">✕</span></span>`).join('')+`<input id="tinput" style="background:transparent;border:none;color:var(--text);outline:none;font-size:12px;min-width:80px;flex:1;font-family:'Barlow',sans-serif;" placeholder="${traits.length?'':'Add trait...'}" onkeydown="addTrait(event)">`;}

window.savePerson=async function(){
  const name=(g('fn')||{value:''}).value.trim();if(!name){showAlert('err','Name required.');return;}
  setSyncStatus('syncing');
  const eid=(g('eid')||{value:''}).value;const id=eid||'p'+Date.now();
  const before={};sorted().forEach((p,i)=>before[p.id]=i+1);
  const alpha=clamp(parseInt((g('falpha')||{value:50}).value));
  const cl=clamp(parseInt((g('fclout')||{value:50}).value));
  const rizz=clamp(parseInt((g('frizz')||{value:50}).value));
  const score=cs(alpha,cl,rizz);
  const p={id,name,nickname:(g('fnick')||{value:''}).value.trim(),score,alpha,clout:cl,rizz,bio:(g('fbio')||{value:''}).value.trim(),photo:getPhotoVal(),color:selColor,traits:[...traits],tierOverride:selTierOverride};
  await setDoc(doc(db,'people',id),p);
  if(eid)await checkRankChanges(before);
  clearForm();renderDList();populatePlayerSelect();showAlert('ok',eid?'Profile updated.':'Profile added.');setSyncStatus('live');
};

window.editPerson=function(id){
  const p=people.find(x=>x.id===id);if(!p)return;
  const set=(el,v)=>{const e=g(el);if(e)e.value=v;};
  set('eid',id);set('fn',p.name);set('fnick',p.nickname||'');set('falpha',p.alpha||50);set('fclout',p.clout||50);set('frizz',p.rizz||50);set('fscore',p.score||50);set('fbio',p.bio||'');
  const pd=g('fphoto-data'),pu=g('fphoto-url');
  if(p.photo){if(p.photo.startsWith('data:')){if(pd)pd.value=p.photo;}else{if(pu)pu.value=p.photo;}showPhotoPrev(p.photo);}else showPhotoPrev(null);
  traits=[...(p.traits||[])];renderTbox();selColor=p.color||COLORS[0];
  document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('sel',s.style.background===selColor));
  selTierOverride=p.tierOverride||'auto';
  document.querySelectorAll('.tier-btn').forEach(b=>b.classList.toggle('sel',b.dataset.tier===selTierOverride));
  const lbl=g('form-lbl');if(lbl)lbl.textContent='Edit Profile';
  document.querySelector('.dcard').scrollIntoView({behavior:'smooth'});
};

window.deletePerson=async function(id,name){if(!confirm(`Remove "${name}"?`))return;setSyncStatus('syncing');await deleteDoc(doc(db,'people',id));renderDList();populatePlayerSelect();showAlert('ok',`"${name}" removed.`);setSyncStatus('live');};
window.confirmDeleteAll=async function(){const d=people;if(!d.length){showAlert('err','No profiles.');return;}if(!confirm(`Delete ALL ${d.length} profile(s)?`))return;setSyncStatus('syncing');const batch=writeBatch(db);d.forEach(p=>batch.delete(doc(db,'people',p.id)));await batch.commit();renderDList();populatePlayerSelect();showAlert('ok','All profiles deleted.');setSyncStatus('live');};

window.clearForm=function(){

  ['falpha','fclout','frizz'].forEach(i=>{const e=g(i);if(e)e.value=50;});
  const sc=g('fscore');if(sc)sc.value=50;
  const pd=g('fphoto-data');if(pd)pd.value='';const pu=g('fphoto-url');if(pu)pu.value='';const pf=g('fphoto-file');if(pf)pf.value='';
  showPhotoPrev(null);traits=[];renderTbox();selColor=COLORS[0];
  selTierOverride='auto';

function renderDList(){
  const el=g('dlist');if(!el)return;const ppl=sorted();
  if(!ppl.length){el.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0;">No profiles yet.</div>';return;}
  el.innerHTML=ppl.map((p,i)=>{
    const ti=tierInfo(p.score||0,p.tierOverride);
    const init=p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const st=`background:${p.color||COLORS[0]};width:34px;height:34px;border-radius:5px;font-size:11px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;`;
    const av=p.photo?`<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:5px;" onerror="this.style.display='none'">`:`${init}`;
    const ovTxt=p.tierOverride&&p.tierOverride!=='auto'?` · ★${p.tierOverride}`:'';
    return`<div class="dli"><div class="dli-av" style="${st}">${av}</div><div class="dli-info"><div class="dli-name">#${i+1} ${esc(p.name)}</div><div class="dli-meta" style="color:${ti.color}">${ti.label}${ovTxt} · ${p.score||0} pts</div></div><div class="dli-btns"><button class="btn btn-sm btn-g" onclick="editPerson('${p.id}')">Edit</button><button class="btn btn-sm btn-r" onclick="deletePerson('${p.id}','${p.name.replace(/'/g,"\\'")}')">Del</button></div></div>`;
  }).join('');
}

window.saveNews=async function(){const headline=(g('nheadline')||{value:''}).value.trim();if(!headline){showAlert('err','Headline required.');return;}const neid=(g('neid')||{value:''}).value;const playerTag=(g('nplayer')||{value:''}).value;setSyncStatus('syncing');if(neid){await setDoc(doc(db,'news',neid),{headline,type:'manual',ts:Date.now(),mentionedIds:playerTag?[playerTag]:[]},{merge:true});}else{await addDoc(collection(db,'news'),{headline,type:'manual',ts:Date.now(),mentionedIds:playerTag?[playerTag]:[]});}clearNewsForm();showAlert('ok',neid?'News updated.':'Posted.');setSyncStatus('live');};
window.editNews=function(id){const n=newsItems.find(x=>x.id===id);if(!n)return;const e=g('neid');if(e)e.value=id;const h=g('nheadline');if(h)h.value=n.headline;};
window.deleteNews=async function(id){if(!confirm('Delete this news item?'))return;await deleteDoc(doc(db,'news',id));showAlert('ok','Deleted.');};
window.clearNewsForm=function(){const e=g('neid');if(e)e.value='';const h=g('nheadline');if(h)h.value='';const np=g('nplayer');if(np)np.value='';};
function renderNList(){const el=g('nlist');if(!el)return;if(!newsItems.length){el.innerHTML='<div style="color:var(--muted);font-size:12px;text-align:center;padding:10px 0;">Nothing posted yet.</div>';return;}el.innerHTML=newsItems.map(n=>`<div class="nli"><span style="font-size:14px;flex-shrink:0;">${n.type==='alert'?'🚨':'📌'}</span><div class="nli-info"><div class="nli-headline">${esc(n.headline)}</div><div class="nli-meta">${n.type==='alert'?'Auto-alert':'Manual'} · ${n.ts?timeAgo(n.ts):''}</div></div><div class="nli-btns">${n.type!=='alert'?`<button class="btn btn-sm btn-g" onclick="editNews('${n.id}')">Edit</button>`:''}<button class="btn btn-sm btn-r" onclick="deleteNews('${n.id}')">✕</button></div></div>`).join('');}

window.changeCode=function(){const n=(g('nc')||{value:''}).value,c=(g('cc')||{value:''}).value;if(!n){showAlert('err','Enter a code.');return;}if(n!==c){showAlert('err','Codes don\'t match.');return;}setCode(n);g('nc').value='';g('cc').value='';showAlert('ok','Code updated.');};
function showAlert(type,msg){const el=g('al-'+(type==='ok'?'ok':'err'));if(!el)return;el.textContent=(type==='ok'?'✓ ':'✗ ')+msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000);}

// ── FIRESTORE REAL-TIME LISTENERS ────────────────────────────────
onSnapshot(collection(db,'people'), snap=>{
  const before={};sorted().forEach((p,i)=>before[p.id]=i+1);
  people=snap.docs.map(d=>({...d.data(),id:d.id}));
  if(Object.keys(prevRanks).length===0)sorted().forEach((p,i)=>prevRanks[p.id]=i+1);
  setSyncStatus('live');
  render();
  if(tab==='dev'){renderDList();populatePlayerSelect();}
  if(currentModalId){const p=people.find(x=>x.id===currentModalId);if(p)buildModal(p);}
});

onSnapshot(query(collection(db,'news'),orderBy('ts','desc')), snap=>{
  newsItems=snap.docs.map(d=>({...d.data(),id:d.id}));
  if(tab==='news')renderNewsPage();
  if(tab==='dev')renderNList();
  if(currentModalId&&currentModalTab==='news'){const p=people.find(x=>x.id===currentModalId);if(p)buildModal(p);}
});

onSnapshot(collection(db,'comments'), snap=>{
  comments={};
  snap.docs.forEach(d=>{const c={...d.data(),id:d.id};if(!comments[c.pid])comments[c.pid]=[];comments[c.pid].push(c);});
  if(currentModalId&&currentModalTab==='comments'){const p=people.find(x=>x.id===currentModalId);if(p)buildModal(p);}
});
</script>
